services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=True
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__
    ports:
      - "8000:8000"

  celery:
    command: celery -A config.celery_app worker --loglevel=info
    environment:
      - DEBUG=True
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
      - /app/__pycache__

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    command: node server.js
    environment:
      - NODE_ENV=development
    volumes:
      - ./deepvision-realtime:/app
      - /app/node_modules
    ports:
      - "4000:4000"

  dashboard:
    image: node:18-alpine
    working_dir: /app
    # For development, use Vite dev server instead of nginx
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_REALTIME_URL=http://localhost:4000
      - NODE_ENV=development
    volumes:
      - ./deepvision-dashboard:/app
      - /app/node_modules
    ports:
      - "3000:3000"
