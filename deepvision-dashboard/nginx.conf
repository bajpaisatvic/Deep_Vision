server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # React SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # MJPEG stream — buffering must be off or the video freezes
    location ~ ^/api/cameras/[0-9]+/stream/ {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy Django REST API
    location /api/ {
        proxy_pass http://django:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Proxy Django admin
    location /admin/ {
        proxy_pass http://django:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve Django static files
    location /static/ {
        proxy_pass http://django:8000/static/;
    }

    # Serve Django media files (uploaded images)
    location /media/ {
        proxy_pass http://django:8000/media/;
    }

    # Proxy Socket.IO WebSocket connections to the realtime server
    location /socket.io/ {
        proxy_pass http://realtime:4000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
